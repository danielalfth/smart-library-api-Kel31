<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Library - Perpustakaan Digital</title>
  <meta name="description" content="Sistem perpustakaan digital untuk meminjam dan mengelola buku secara online.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-card: rgba(17, 24, 39, 0.8);
      --bg-glass: rgba(255, 255, 255, 0.03);
      --border-color: rgba(255, 255, 255, 0.06);
      --border-glow: rgba(99, 102, 241, 0.3);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-primary: #6366f1;
      --accent-secondary: #8b5cf6;
      --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
      --success: #10b981;
      --success-bg: rgba(16, 185, 129, 0.1);
      --error: #ef4444;
      --error-bg: rgba(239, 68, 68, 0.1);
      --warning: #f59e0b;
      --shadow-lg: 0 25px 50px rgba(0, 0, 0, 0.4);
      --shadow-glow: 0 0 30px rgba(99, 102, 241, 0.15);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse 50% 30% at 50% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    .header {
      position: relative;
      z-index: 10;
      padding: 2rem 2rem 1rem;
      text-align: center;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      background: var(--bg-glass);
      border: 1px solid var(--border-color);
      border-radius: 100px;
      font-size: 0.75rem;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .header-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 300;
    }

    /* Main Layout */
    .main-container {
      position: relative;
      z-index: 10;
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 2rem 3rem;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 2rem;
    }

    /* Section titles */
    .section-title {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .section-title .icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .section-title h2 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .section-title .count {
      margin-left: auto;
      padding: 0.2rem 0.75rem;
      background: var(--bg-glass);
      border: 1px solid var(--border-color);
      border-radius: 100px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    /* Book Grid */
    .book-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
    }

    .book-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: default;
      backdrop-filter: blur(10px);
    }

    .book-card:hover {
      border-color: var(--border-glow);
      box-shadow: var(--shadow-glow);
      transform: translateY(-2px);
    }

    .book-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .book-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .book-stock {
      flex-shrink: 0;
      padding: 0.25rem 0.7rem;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .stock-available {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .stock-empty {
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .book-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .book-meta-item {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.7rem;
      background: var(--bg-glass);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .book-meta-item .label {
      color: var(--text-muted);
    }

    .book-id-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-color);
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
    }

    /* Sidebar */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Borrow Form Card */
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(10px);
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-glass);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: all 0.25s ease;
      outline: none;
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .form-group input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .btn-borrow {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent-gradient);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.01em;
    }

    .btn-borrow:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35);
    }

    .btn-borrow:active {
      transform: translateY(0);
    }

    .btn-borrow:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-borrow .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    .btn-borrow.loading .btn-text { display: none; }
    .btn-borrow.loading .spinner { display: inline-block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Message */
    .message {
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
      display: none;
      animation: slideUp 0.3s ease;
    }

    .message.show { display: flex; align-items: center; gap: 0.5rem; }

    .message.success {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .message.error {
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.25rem;
    }

    /* Recent loans */
    .loan-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .loan-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      background: var(--bg-glass);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-size: 0.8rem;
      transition: all 0.2s ease;
    }

    .loan-item:hover {
      border-color: var(--border-glow);
    }

    .loan-avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .loan-info {
      flex: 1;
      min-width: 0;
    }

    .loan-book {
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .loan-member {
      color: var(--text-muted);
      font-size: 0.7rem;
    }

    .loan-date {
      font-size: 0.65rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-glass) 25%, rgba(255,255,255,0.06) 50%, var(--bg-glass) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 10px;
      height: 80px;
      border: 1px solid var(--border-color);
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .empty-state .icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .main-container {
        grid-template-columns: 1fr;
        padding: 1rem;
      }

      .header h1 {
        font-size: 1.8rem;
      }

      .stats-bar {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 500px) {
      .header {
        padding: 1.5rem 1rem 0.5rem;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .stats-bar {
        grid-template-columns: 1fr 1fr 1fr;
        gap: 0.5rem;
      }

      .stat-card {
        padding: 0.75rem 0.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-badge">
      <span class="dot"></span>
      <span>Sistem Aktif</span>
    </div>
    <h1>📚 Smart Library</h1>
    <p>Sistem Perpustakaan Digital — Kelompok 31</p>
  </header>

  <!-- Main Content -->
  <div class="main-container">
    
    <!-- Left: Book List -->
    <div class="left-panel">
      <div class="section-title">
        <div class="icon">📖</div>
        <h2>Daftar Buku</h2>
        <span class="count" id="bookCount">Memuat...</span>
      </div>
      <div class="book-grid" id="bookGrid">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>

    <!-- Right: Sidebar -->
    <div class="sidebar">

      <!-- Borrow Form -->
      <div class="form-card">
        <div class="section-title">
          <div class="icon">📝</div>
          <h2>Pinjam Buku</h2>
        </div>

        <form id="borrowForm" autocomplete="off">
          <div class="form-group">
            <label for="inputBookId">ID Buku</label>
            <input type="text" id="inputBookId" placeholder="Masukkan ID buku..." required>
          </div>
          <div class="form-group">
            <label for="inputMemberId">ID Member</label>
            <input type="text" id="inputMemberId" placeholder="Masukkan ID member..." required>
          </div>
          <button type="submit" class="btn-borrow" id="btnBorrow">
            <span class="btn-text">📤 Pinjam Buku</span>
            <span class="spinner"></span>
          </button>
        </form>

        <div class="message" id="borrowMessage"></div>
      </div>

      <!-- Stats -->
      <div class="stats-bar" id="statsBar">
        <div class="stat-card">
          <div class="stat-value" id="statBooks">-</div>
          <div class="stat-label">Total Buku</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statAvailable">-</div>
          <div class="stat-label">Tersedia</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statLoans">-</div>
          <div class="stat-label">Dipinjam</div>
        </div>
      </div>

      <!-- Recent Loans -->
      <div class="form-card">
        <div class="section-title">
          <div class="icon">🕑</div>
          <h2>Peminjaman Terbaru</h2>
        </div>
        <div class="loan-list" id="loanList">
          <div class="skeleton" style="height: 50px;"></div>
          <div class="skeleton" style="height: 50px;"></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    // ========== Fetch Books ==========
    async function loadBooks() {
      const grid = document.getElementById('bookGrid');
      const count = document.getElementById('bookCount');

      try {
        const res = await fetch(`${API_BASE}/api/books`);
        const books = await res.json();

        count.textContent = `${books.length} buku`;

        // Stats
        document.getElementById('statBooks').textContent = books.length;
        const available = books.reduce((sum, b) => sum + (b.available_copies || 0), 0);
        document.getElementById('statAvailable').textContent = available;

        if (books.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <div class="icon">📭</div>
              <p>Belum ada buku terdaftar.</p>
            </div>
          `;
          return;
        }

        grid.innerHTML = books.map(book => `
          <div class="book-card">
            <div class="book-card-top">
              <div>
                <div class="book-title">${escapeHtml(book.title)}</div>
              </div>
              <span class="book-stock ${book.available_copies > 0 ? 'stock-available' : 'stock-empty'}">
                ${book.available_copies > 0 ? `Stok: ${book.available_copies}` : 'Habis'}
              </span>
            </div>
            <div class="book-meta">
              <span class="book-id-badge">ID: ${book.id}</span>
              <span class="book-meta-item">
                <span class="label">✍️</span> ${escapeHtml(book.author_name || 'Tidak diketahui')}
              </span>
              <span class="book-meta-item">
                <span class="label">🏷️</span> ${escapeHtml(book.category_name || 'Umum')}
              </span>
            </div>
          </div>
        `).join('');

      } catch (err) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="icon">⚠️</div>
            <p>Gagal memuat daftar buku.</p>
          </div>
        `;
        count.textContent = 'Error';
      }
    }

    // ========== Fetch Loans ==========
    async function loadLoans() {
      const list = document.getElementById('loanList');

      try {
        const res = await fetch(`${API_BASE}/api/loans`);
        const loans = await res.json();

        document.getElementById('statLoans').textContent = loans.length;

        if (loans.length === 0) {
          list.innerHTML = `
            <div class="empty-state">
              <div class="icon">📋</div>
              <p>Belum ada peminjaman.</p>
            </div>
          `;
          return;
        }

        // Show last 5 loans
        const recent = loans.slice(-5).reverse();
        list.innerHTML = recent.map(loan => {
          const initials = (loan.member_name || '??').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
          const date = loan.loan_date ? new Date(loan.loan_date).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }) : '-';
          return `
            <div class="loan-item">
              <div class="loan-avatar">${initials}</div>
              <div class="loan-info">
                <div class="loan-book">${escapeHtml(loan.book_title || '-')}</div>
                <div class="loan-member">${escapeHtml(loan.member_name || '-')}</div>
              </div>
              <div class="loan-date">${date}</div>
            </div>
          `;
        }).join('');

      } catch (err) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="icon">⚠️</div>
            <p>Gagal memuat data.</p>
          </div>
        `;
      }
    }

    // ========== Borrow Form ==========
    document.getElementById('borrowForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const bookId = document.getElementById('inputBookId').value.trim();
      const memberId = document.getElementById('inputMemberId').value.trim();
      const btn = document.getElementById('btnBorrow');
      const msg = document.getElementById('borrowMessage');

      if (!bookId || !memberId) return;

      btn.classList.add('loading');
      btn.disabled = true;
      msg.className = 'message';
      msg.style.display = 'none';

      try {
        // Due date: 14 hari dari sekarang
        const dueDate = new Date();
        dueDate.setDate(dueDate.getDate() + 14);

        const res = await fetch(`${API_BASE}/api/loans`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            book_id: parseInt(bookId),
            member_id: parseInt(memberId),
            due_date: dueDate.toISOString().split('T')[0]
          })
        });

        const data = await res.json();

        if (res.ok) {
          msg.className = 'message success show';
          msg.innerHTML = '✅ Buku berhasil dipinjam!';
          document.getElementById('borrowForm').reset();
          // Refresh data
          loadBooks();
          loadLoans();
        } else {
          msg.className = 'message error show';
          msg.innerHTML = `❌ ${escapeHtml(data.error || 'Terjadi kesalahan.')}`;
        }

      } catch (err) {
        msg.className = 'message error show';
        msg.innerHTML = '❌ Tidak dapat terhubung ke server.';
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });

    // ========== Helpers ==========
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ========== Init ==========
    loadBooks();
    loadLoans();
  </script>

</body>
</html>
